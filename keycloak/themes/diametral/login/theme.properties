# Diametral login theme — extends the classic Keycloak login theme and restyles
# it via one stylesheet. Inheriting `keycloak` means every page (login, reset
# password, OTP, register, update password, verify email, error, info) is covered
# without overriding FreeMarker templates — robust across Keycloak versions.
parent=keycloak
import=common/keycloak

styles=css/styles.css

# Keep Keycloak's defaults for everything else.
kcHtmlClass=login-pf
